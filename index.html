<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish-Measure AR Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
        #container { position: relative; width: 100vw; height: 100vh; background: #222; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        /* ボタン類を右端に集約 */
        #controls { position: absolute; top: 0; right: 0; height: 100%; width: 160px; display: flex; flex-direction: column; justify-content: center; gap: 20px; padding-right: 20px; pointer-events: auto; }
        button { width: 100%; padding: 25px 10px; font-size: 18px; border-radius: 15px; border: 2px solid #fff; font-weight: bold; cursor: pointer; }
        #btn-hold { background: #eee; color: #000; }
        #btn-save { background: #2ecc71; color: #fff; display: none; }
        #btn-cancel { background: #e74c3c; color: #fff; display: none; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas-measure"></canvas>
        <div id="controls">
            <button id="btn-hold" onclick="toggleHold(true)">ホールド</button>
            <button id="btn-cancel" onclick="toggleHold(false)">戻る</button>
            <button id="btn-save" onclick="finalizeAndSave()">確定・保存</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
