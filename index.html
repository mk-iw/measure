<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish-Measure Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 画面上部の横に長いバーにボタンを配置 */
        #ui-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 44px;
            display: flex; justify-content: center; align-items: center; 
            z-index: 1000; background: rgba(0,0,0,0.6);
        }
        button {
            height: 34px; width: 25%; margin: 0 5px; font-size: 14px; font-weight: bold; 
            border-radius: 4px; border: 1px solid #fff;
        }
        #btn-hold { background: #fff; color: #000; }
        #btn-save { background: #2ecc71; color: #fff; display: none; }
        #btn-cancel { background: #e74c3c; color: #fff; display: none; }
    </style>
</head>
<body>
    <div id="ui-header">
        <button id="btn-hold" onclick="toggleHold(true)">ホールド</button>
        <button id="btn-cancel" onclick="toggleHold(false)">戻る</button>
        <button id="btn-save" onclick="finalizeAndSave()">確定・保存</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas-measure"></canvas>
    <script src="app.js"></script>
</body>
</html>
