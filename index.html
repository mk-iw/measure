<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish-Measure AR Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
        /* スマホは縦持ちのまま、このCanvasを中で90度回して横長として使う */
        canvas { width: 100vw; height: 100vh; object-fit: contain; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas-measure"></canvas>
    <script src="app.js"></script>
</body>
</html>
