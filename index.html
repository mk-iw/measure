<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish-Measure AR Pro</title>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #header { position: absolute; top: 10px; right: 10px; text-align: right; }
        #no-display { font-size: 28px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 15px; border: 1px solid #fff; }
        #footer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        #status { padding: 10px 20px; border-radius: 30px; background: rgba(0,255,0,0.5); font-weight: bold; }
        .holding { background: rgba(0,120,255,0.8) !important; }
        #mode-selector { position: absolute; top: 10px; left: 10px; pointer-events: auto; }
        select { padding: 8px; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas-measure"></canvas>
        <div id="ui-layer">
            <div id="mode-selector">
                <select id="measure-mode" onchange="changeMode(this.value)">
                    <option value="fish">魚モード (尾叉長/全長)</option>
                    <option value="poly">多角形モード (頂点計測)</option>
                </select>
            </div>
            <div id="header">
                <div id="no-display">No. ---</div>
            </div>
            <div id="footer">
                <span id="status">マーカー待機中...</span>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
